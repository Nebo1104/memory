<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Archive Letter: Bureaucratic Quest</title>
    <style>
        /* Блокування скролу всієї сторінки */
        body { 
            background: #d3c9b1; 
            font-family: "Courier New", monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            box-sizing: border-box;
            overflow: hidden; 
        }
        
        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 30px; 
            width: 100%; 
            max-width: 1200px; 
            height: 100%;
            align-items: stretch; 
        }
        
        /* Ліва колонка з папером: скрол з'являється тільки всередині неї за потреби */
        .paper-column { 
            flex: 1.2; 
            height: 100%;
            overflow-y: auto; 
            padding-right: 5px;
        }
        
        .paper { 
            background: #fff; 
            padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            position: relative; 
            background-image: url("https://transparenttextures.com"); 
            min-height: 100%; 
            box-sizing: border-box;
            transition: filter 0.5s; 
        }
        
        /* Права колонка з інтерфейсом: жорстко зафіксована на екрані */
        .ui-column { 
            flex: 0.8; 
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .ui-panel { 
            background: rgba(255,255,255,0.9); 
            padding: 25px; 
            border: 1px solid #999; 
            border-radius: 4px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        #buttons {
            flex-grow: 1; /* Змушує блок кнопок займати весь вільний простір */
            overflow-y: auto;
        }

        .stamp { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); border: 6px double #8b0000; color: #8b0000; padding: 15px 30px; font-size: 2.2em; font-weight: bold; text-transform: uppercase; opacity: 0; pointer-events: none; z-index: 10; transition: opacity 0.2s; text-align: center; }
        button { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #222; color: #eee; border: none; font-family: inherit; cursor: pointer; text-align: left; transition: 0.2s; font-size: 13px; box-sizing: border-box; }
        button:hover { background: #8b0000; transform: translateX(5px); }
        .explanation { border-left: 4px solid #8b0000; padding: 15px; margin: 10px 0; display: none; font-size: 0.9em; line-height: 1.4; }
        .exp-error { background: #fff5f5; border-color: #8b0000; color: #333; }
        .exp-correct { background: #f5fff5; border-color: #2e7d32; color: #1b5e20; }
        .filled-text { font-weight: bold; color: black; animation: fadeIn 0.8s forwards; display: block; margin-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .shake { animation: shakeAnim 0.3s; }
        @keyframes shakeAnim { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .kgb-arrest { background: #1a1a1a !important; color: #cc0000 !important; border: 5px solid #cc0000 !important; }
        .military-shame { background: #2e3b23 !important; color: #e0e0e0 !important; border: 5px solid #4a5d3a !important; }
        .party-silence { background: #444 !important; color: #aaa !important; border: 5px solid #666 !important; }
        .btn-continue { background: #2e7d32; text-align: center; font-weight: bold; margin-top: 15px; color: white; }

        @media (max-width: 900px) { 
            body { overflow: auto; height: auto; }
            .main-container { flex-direction: column; } 
            .paper-column, .ui-column { width: 100%; height: auto; } 
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="paper-column">
        <div class="paper" id="doc">
            <div class="stamp" id="stamp-bad">REJECTED</div>
            <div class="stamp" id="stamp-ok" style="border-color: green; color: green;">SENT</div>
            <div style="text-align: right;"><div id="p-1" style="min-height: 1.2em;">____________________</div>February 25, 1958</div>
            <h3 style="text-align: center; margin-top: 30px;">STATEMENT</h3>
            <div id="p-2"></div><div id="p-3"></div><div id="p-4"></div><div id="p-5"></div>
            <div style="margin-top: 50px; font-size: 0.9em;">Signature: <span style="text-decoration: underline;">M.P. Neborachko</span><br>Address: Military Unit 54962, Zaporizhzhia city.</div>
        </div>
    </div>

    <div class="ui-column">
        <div class="ui-panel" id="ui">
            <div id="instr"><b>Step 1:</b> Recipient selection:</div>
            <div id="explanation-box" class="explanation"></div>
            <div id="buttons"></div>
            
            <!-- Жорстко закріплена кнопка внизу правої панелі -->
            <button onclick="triggerImmediateFinale()" id="always-visible-skip" style="display: block; width: 100%; margin-top: auto; padding: 14px; background: #8a3333; color: #fff; border: 1px solid #8a3333; text-align: center; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15); font-family: inherit;">
                Skip to Investigation Finale ➔
            </button>
        </div>
    </div>
</div>

<script>
    let currentStep = 1;

    const stepsData = {
        1: { 
            correctText: "To the Board of the Supreme Court of the USSR", 
            instr: "Step 1: Recipient selection:",
            correctExp: "Correct. Legal rehabilitation was the responsibility of the Military Board. This is the only address that forces the bureaucratic machine to work.",
            btns: [
                { t: "To the Board of the Supreme Court of the USSR", v: true },
                { t: "To the Comrades in Moscow", v: false, type: 'guardhouse', e: "Your commander cursed you out on the parade ground for such informal nonsense. Sent to the guardhouse for 10 days." },
                { t: "To the Communist Party Committee", v: false, type: 'party', e: "No response. Instead, a formal reprimand was sent to your unit for violating hierarchy." },
                { t: "To the Foreign Press Office", v: false, type: 'arrest', e: "Treason. Attempting to contact international media." }
            ]
        },
        2: { 
            correctText: "On June 29, 1941, in the village of Stav-Sloboda, my father Petro Filippovich Neborachko was arrested for reasons unknown to me.", 
            instr: "Step 2: Describe the arrest:",
            correctExp: "Correct. 'Reasons unknown' is a safe formula. It implies you don't judge the state, but simply seek information.",
            btns: [
                { t: "In 1941, my father Petro Neborachko was arrested for reasons unknown to me.", v: true },
                { t: "My father was kidnapped by the NKVD during the war.", v: false, type: 'shame', e: "Ideological mistake. Specifically blaming the NKVD is seen as an insult to state security." },
                { t: "My father disappeared without a trace in 1941.", v: false, e: "A 'disappearance' implies he might be a deserter. You must acknowledge the arrest." },
                { t: "I will go to the newspapers if you don't find him.", v: false, type: 'arrest', e: "Anti-Soviet Agitation. Threatening the state with exposure." }
            ]
        },
        3: { 
            correctText: "The Radomyshl military office replied that he was 'arrested' and 'repressed'. Where he is now remains unknown.", 
            instr: "Step 3: State the military office's response:",
            correctExp: "Correct. Citing the military office (Voenkomat) gives your request legal weight and shows you follow the chain of command.",
            btns: [
                { t: "The military office replied with only one word: 'repressed'.", v: true },
                { t: "The local officials refuse to disclose the truth.", v: false, e: "Attacking local power is a direct confrontation. The Court will always side with officials." },
                { t: "The state destroyed all documents about him.", v: false, type: 'arrest', e: "Accusing the state of destroying archives is slander. Arrested." },
                { t: "I'll broadcast this on Radio Free Europe.", v: false, type: 'arrest', e: "Collaboration with foreign intelligence." }
            ]
        },
        4: { 
            correctText: "It is known that at that time there were cases of violation of socialist legality, due to the criminal activities of Beria.", 
            instr: "Step 4: Choose the political argument:",
            correctExp: "Correct. Blaming 'Beria' was the only safe legal loophole to admit the state was wrong without blaming the system itself.",
            btns: [
                { t: "Perhaps he was a victim of Beria's criminal activities.", v: true },
                { t: "The Great Terror was the biggest mistake of our history.", v: false, type: 'arrest', e: "The term 'Great Terror' is an anti-Soviet Western concept in 1958. Arrested." },
                { t: "Restore justice or I will write to embassies.", v: false, type: 'arrest', e: "Contacting embassies is an act of defection." },
                { t: "I demand to know where the bodies are buried.", v: false, e: "Confrontational. Focus on rehabilitation, not on mass graves." }
            ]
        },
        5: { 
            correctText: "Please clarify the case and send me a certificate needed for my military service.", 
            instr: "Step 5: Final request:",
            correctExp: "Correct. Framing this request around your 'military service' gives a clear, practical reason for the bureaucracy to assist a loyal soldier.",
            btns: [
                { t: "Please clarify the case and send me a certificate for my military service.", v: true },
                { t: "Acknowledge the crime of your system immediately.", v: false, type: 'arrest', e: "Direct attack on the regime. Your service record is destroyed, and you are detained." },
                { t: "Give me money as compensation for my suffering.", v: false, e: "The state does not compensate children of the repressed at this stage. Request denied." }
            ]
        }
    };

    function renderUI(step) {
        currentStep = step;
        const data = stepsData[step];
        document.getElementById('instr').innerHTML = `<b>${data.instr}</b>`;
        
        const btnBox = document.getElementById('buttons');
        btnBox.innerHTML = '';
        
        data.btns.forEach(btn => {
            const b = document.createElement('button');
            b.innerText = btn.t;
            b.onclick = () => handleChoice(btn, data);
            btnBox.appendChild(b);
        });
    }

    function handleChoice(btn, data) {
        const expBox = document.getElementById('explanation-box');
        expBox.style.display = 'block';
        
        if (btn.v) {
            expBox.className = "explanation exp-correct";
            expBox.innerText = data.correctExp;
            
            document.getElementById(`p-${currentStep}`).innerHTML = `<span class="filled-text">${data.correctText}</span>`;
            
            const btnBox = document.getElementById('buttons');
            btnBox.innerHTML = '';
            const nextB = document.createElement('button');
            nextB.className = "btn-continue";
            nextB.innerText = currentStep < 5 ? "CONTINUE →" : "SUBMIT PETITION →";
            nextB.onclick = () => {
                expBox.style.display = 'none';
                if (currentStep < 5) {
                    renderUI(currentStep + 1);
                } else {
                    finish();
                }
            };
            btnBox.appendChild(nextB);
        } else {
            expBox.className = "explanation exp-error";
            expBox.innerText = btn.e;
            document.getElementById('doc').classList.add('shake');
            setTimeout(() => document.getElementById('doc').classList.remove('shake'), 300);
            
            if (btn.type) {
                document.getElementById('stamp-bad').style.opacity = '1';
                
                const skipBtn = document.getElementById('always-visible-skip');
                if (skipBtn) { skipBtn.style.display = 'none'; }

                const btnBox = document.getElementById('buttons');
                btnBox.innerHTML = '';
                
                let panelClass = 'ui-panel';
                if (btn.type === 'arrest') panelClass += ' kgb-arrest';
                if (btn.type === 'guardhouse') panelClass += ' military-shame';
                if (btn.type === 'party') panelClass += ' party-silence';
                
                document.getElementById('ui').className = panelClass;
                
                const failB = document.createElement('button');
                failB.innerText = "TRY AGAIN (RELOAD)";
                failB.style.background = "#8b0000";
                failB.onclick = () => location.reload();
                btnBox.appendChild(failB);
            }
        }
    }

    function triggerImmediateFinale() {
        buildModalStructure();
        showFinalDiscoveryModal();
    }

    function finish() {
        localStorage.setItem('gameFinished', 'true'); 
        
        const skipBtn = document.getElementById('always-visible-skip');
        if (skipBtn) { skipBtn.style.display = 'none'; }

        document.getElementById('ui').innerHTML = `
            <h2 style="color:#2b5c8f; border: 2px solid #2b5c8f; padding: 10px; text-align: center; text-transform: uppercase; font-weight: bold; margin-top: 0;">LETTER SENT</h2>
            <p style="font-size: 13px; line-height: 1.5; color: #2c2523;">Historical Outcome: The real Petro Neborachko was officially rehabilitated in the late 1950s thanks to this procedural step.</p>
            
            <button onclick="showFinalDiscoveryModal()" style="text-align:center; background:#8a3333; border: 2px solid #8a3333; color:#fff; width:100%; padding:14px; font-family:inherit; font-weight:bold; font-size:12px; cursor:pointer; text-transform:uppercase; margin-bottom:10px; box-shadow: 4px 4px 0px rgba(0,0,0,0.2); display: block; box-sizing: border-box;">
                Read the Investigation Finale →
            </button>
            
            <button onclick="location.reload()" style="text-align:center; background:#2c2523; border: 2px solid #2c2523; color:#fdfbf7; width:100%; padding:10px; font-family:inherit; font-size:12px; cursor:pointer; text-transform:uppercase; display: block; box-sizing: border-box;">RESTART</button>
            <p style="font-size:0.8em; color:#666; text-align:center; margin-top:10px;">(Explanations will be skipped in the next run)</p>
        `;
        
        const stamp = document.getElementById('stamp-ok');
        if (stamp) { stamp.style.opacity = '1'; }
        
        buildModalStructure();
    }

    function buildModalStructure() {
        if (!document.getElementById('finalDiscoveryModal')) {
            const modal = document.createElement('div');
            modal.id = 'finalDiscoveryModal';
            modal.style.cssText = `
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(17, 14, 13, 0.97); z-index: 9999; align-items: center; justify-content: center;
                padding: 20px; box-sizing: border-box; font-family: inherit;
            `;
            modal.innerHTML = `
                <div style="max-width: 560px; width: 100%; max-height: 85vh; background: #fdfbf7; border: 2px solid #8a3333; outline: 4px double #8a3333; outline-offset: -8px; padding: 35px; box-shadow: 15px 15px 0px rgba(0,0,0,0.6); box-sizing: border-box; color: #2c2523; overflow-y: auto; text-align: left; line-height: 1.6;">
                    <div style="font-size: 16px; color: #8a3333; font-weight: bold; margin-bottom: 20px; border-bottom: 2px dashed #8a3333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">
                        Author's Note & Document Discovery
                    </div>
                    <div style="font-size: 13px; margin-bottom: 18px; padding: 12px; background: rgba(44, 37, 35, 0.04); border-left: 4px solid #2c2523;">
                        During the process of declassifying, digitizing, and analyzing this criminal file using AI tools, I was in direct contact and shared these archival materials with the living branch of Petro Neborachko's family — including the descendants of Mykola, the son who drafted this exact petition in 1958.
                    </div>
                    <div style="font-size: 13px; margin-bottom: 22px; padding: 12px; background: rgba(138, 51, 51, 0.04); border-left: 4px solid #8a3333;">
                        <strong>THE FINAL REVELATION:</strong><br><br>
                        The most staggering discovery within the declassified folders was an internal, classified NKVD service memo dated late 1942. It explicitly states that Petro Neborachko vanished completely during the chaotic wartime evacuation, and could not be found anywhere across the Gulag camp system. 
                        <br><br>
                        Hearing this, his relatives wept during our conversation. For over 80 years, the family lived with the heavy, absolute certainty that their ancestor had perished behind the barbed wire of a Soviet labor camp. Now, it turns out the historical truth is far more complex, open-ended, and fragmented than anyone believed for almost a century.
                    </div>
                    <button onclick="closeFinalDiscoveryModal()" style="width: 100%; background: #2c2523; border: 1px solid #2c2523; color: #fdfbf7; padding: 15px; font-family: inherit; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);">
                        Close Archive & Complete Journey
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
        }
    }

    function showFinalDiscoveryModal() {
        document.getElementById('finalDiscoveryModal').style.display = 'flex';
    }

    function closeFinalDiscoveryModal() {
        document.getElementById('finalDiscoveryModal').style.display = 'none';
    }

    renderUI(1);
</script>

</body>
</html>
