<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protocol №942 - Intro</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: "Courier New", monospace; overflow: hidden; }
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black url('https://githubusercontent.com') no-repeat center center; 
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #intro-screen::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .intro-title { z-index: 2; font-size: 3.5em; letter-spacing: 8px; color: #ff4444; text-shadow: 2px 2px 15px black; margin-bottom: 40px; font-family: Impact, sans-serif; text-transform: uppercase; }
        .btn-group { z-index: 2; display: flex; gap: 20px; }
        .btn { padding: 15px 50px; background: #8b0000; color: white; border: 2px solid #8b0000; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 1.1em; }
        .btn:hover { background: #ff4444; border-color: #ff4444; }
        .btn-alt { background: transparent; border: 2px solid white; }
        .btn-alt:hover { background: white; color: black; }
        #about-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; display: none; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="intro-screen">
        <h1 class="intro-title">Protocol №942</h1>
        <div class="btn-group">
            <button class="btn" onclick="window.location.href='interrogation.html'">START</button>
            <button class="btn btn-alt" onclick="document.getElementById('about-modal').style.display='flex'">ABOUT</button>
        </div>
    </div>

    <div id="about-modal" onclick="this.style.display='none'">
        <div style="background: #1a1a1a; border: 1px solid #333; padding: 40px; max-width: 500px; color: white; text-align: left;" onclick="event.stopPropagation()">
            <h2 style="color: #ff4444; font-family: Impact;">PROJECT OVERVIEW</h2>
            <p>A reconstruction of the <b>Neborachko</b> family tragedy.</p>
            <p><b>Part 1:</b> 1941. Interrogation in an NKVD basement.</p>
            <p><b>Part 2:</b> 1958. Bureaucratic struggle for rehabilitation.</p>
            <button class="btn" style="width: 100%; margin-top: 20px;" onclick="document.getElementById('about-modal').style.display='none'">CLOSE</button>
        </div>
    </div>
</body>
</html>
