<style>
  body { 
    background-image: url('https://raw.githubusercontent.com/Nebo1104/memory/game/1game.png');
    background-size: cover; 
    background-position: center; 
    background-attachment: fixed; 
    color: #1a1a1a; /* <--- Зроблено значно темнішим для контрасту */
    font-family: 'Courier New', monospace; 
    padding: 20px; 
    line-height: 1.4;
  }
  .kitchen-table { 
    max-width: 600px; 
    margin: 20px auto; 
    border: 2px solid #2a2a2a; /* <--- Чіткіша рамка */
    padding: 20px; 
    background: rgba(255, 255, 255, 0.92); /* <--- Оптимальна щільність білого фону */
    box-shadow: 6px 6px 0px #1a1a1a; /* <--- Контрастна тінь */
    transition: all 0.3s ease;
  }
  .ambient-desc {
    color: #2b2b2b; /* <--- Текст більше не блідий */
    font-style: italic;
    margin-bottom: 15px;
    font-size: 13px;
    border-bottom: 2px solid #1a1a1a; /* <--- Товстіша лінія розмежування */
    padding-bottom: 10px;
  }
  
  .fade-in {
    opacity: 0;
    transform: translateY(5px);
    animation: fadeInEffect 0.5s forwards ease-out;
  }
  
  @keyframes fadeInEffect {
    to { opacity: 1; transform: translateY(0); }
  }

  .log-entry { margin-bottom: 12px; font-size: 14px; }
  .player { color: #0f3c6d; font-weight: bold; } /* <--- Насичений синій */
  .grandpa { color: #805000; font-weight: bold; } /* <--- Темніший золотий */
  .grandpa.angry { color: #801010; font-weight: bold; } /* <--- Глибокий червоний */
  
  .action-desc {
    color: #2b2b2b; /* <--- Зроблено чітким */
    font-style: italic;
    margin: 8px 0;
    font-size: 13px;
  }

  .viewer-note {
    color: #1a1a1a; /* <--- Чистий контраст */
    background: #e6e0d4; /* <--- Темніша підкладка */
    padding: 8px 12px;
    margin: 8px 0 15px 0;
    font-size: 13px;
    border-left: 4px solid #1a1a1a;
  }

  .inner-thought { 
    color: #7a1212; /* <--- Контрастний бордовий */
    font-style: italic; 
    background: #ffebeb; /* <--- Більш насичений рожевий для читання */
    padding: 12px; 
    border-left: 4px solid #b83232; 
    margin-top: 15px; 
    font-size: 13px;
    margin-bottom: 15px;
  }
  
  .choices button { 
    display: block; 
    width: 100%; 
    background: #ffffff; 
    border: 2px solid #1a1a1a; /* <--- Чорна контрастна рамка кнопок */
    color: #1a1a1a; /* <--- Чорний текст кнопок */
    padding: 10px; 
    margin-bottom: 8px; 
    text-align: left; 
    cursor: pointer; 
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold; /* <--- Жирний шрифт для кращої читабельності */
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
  }
  .choices button:hover { 
    background: #1a1a1a; /* <--- Інверсія при наведенні (чорний фон) */
    color: #ffffff; /* <--- Білий текст при наведенні */
    transform: translateX(2px);
  }
  
  .next-btn {
    margin-top: 5px; 
    background: #1a1a1a !important; /* <--- Акцентна кнопка тепер темна */
    color: #ffffff !important; 
    border: 2px solid #1a1a1a !important;
    text-align: center !important;
    font-weight: bold;
  }
  .restart-btn {
    margin-top: 5px;
    background: #7a1212 !important; /* <--- Кнопка рестарту чітко видима */
    color: #ffffff !important;
    border: 2px solid #7a1212 !important;
    text-align: center !important;
    font-weight: bold;
  }
</style>


<div class="kitchen-table" id="tableContainer">
  <div class="ambient-desc">
    Kitchen. Faded oilcloth. Grandfather sits across from you. You need facts about Petro Neborachko's arrest.
  </div>

  <div id="dialogueLog"></div>

  <div class="choices" id="actionPanel">
    <button onclick="startConversation()">
      Grandpa, tell me about Petro Neborachko.
    </button>
  </div>
</div>

<script>
    const grandfatherData = {
        1: {
            reply: "\"No papers here. I was born later. All I know: he was a blacksmith, arrested by the NKVD in 1941, and died in Kolyma around '42. They said he was just a cruel, silent drunk. That’s all.\"",
            context: "The Soviet state rarely left official records or search warrants with the families of those arrested."
        },
        2: {
            reply: "\"No letters. The NKVD took him from his forge in 1941, and by '43 he was dead somewhere in Kolyma. He was a silent, cruel drunkard who left nothing behind. Just a ghost.\"",
            context: "There are no letters. Enemies of the people sent to Kolyma camps were banned from any contact with the outside world."
        },
        3: {
            reply: "\"Nobody knew the charges. Who would dare ask in 1941? He was a blacksmith, taken away, and died in Kolyma by '43. They always said he was a bitter, cruel drunk who brought it on himself.\"",
            context: "Official penal articles were kept secret. Families only knew vague rumors, never the formal charges."
        },
        4: {
            reply: "\"There was no shop. Everything was nationalized back in the 30s. He was just a blacksmith working for the collective farm (kolkhoz) when the NKVD took him in 1941. He died in Kolyma soon after. We remembered him only as a terrifying, silent drunk. The state already owned the rest.\"",
            context: "Property confiscation was a standard NKVD practice. It served to terrorize the local community and isolate the victim's family."
        },
        5: {
            reply: "\"No papers. He vanished into Kolyma after the 1941 arrest, and we never looked into it. Why clear the name of a man known only for his cruelty, heavy silence, and endless drinking?\"",
            context: "Massive post-Stalin rehabilitation waves often bypassed individuals whose relatives were too terrified to submit official state requests."
        }
    };

    let askedCount = 0;
    const totalQuestions = 5;

    function askQuestion(id) {
        // Вимикаємо кнопку, на яку щойно натиснули
        const btn = document.getElementById(`q${id}`);
        if (btn) { btn.disabled = true; }

        const stream = document.getElementById('dialogue-stream');
        const data = grandfatherData[id];

        // Додаємо репліку діда та історичний контекст у стрім паперу праворуч
        stream.innerHTML += `
            <div class="dialogue-turn">
                <b style="color: #8b0000;">Grandfather:</b> ${data.reply}
                <div class="context-box">
                    <b>💡 Context:</b> ${data.context}
                </div>
            </div>
        `;

        // Автоматично прокручуємо папір вниз, підтримуючи дискомфортний ритм
        const paperColumn = document.querySelector('.paper-column');
        if (paperColumn) { paperColumn.scrollTop = paperColumn.scrollHeight; }

        askedCount++;

        // Перевіряємо, чи всі питання вичерпано
        if (askedCount === totalQuestions) {
            triggerDialogueEnd();
        }
    }

    function triggerDialogueEnd() {
        const stream = document.getElementById('dialogue-stream');
        
        // Змінюємо інструкцію ліворуч на фінальний тупик
        document.getElementById('instr').innerHTML = `<b style="color:#8b0000;">He has nothing more to say. The repeating story is all that is left.</b>`;
        
        // Додаємо кнопку переходу до архівів прямо під папером праворуч
        const proceedBox = document.getElementById('proceed-box');
        proceedBox.innerHTML = `
            <button onclick="window.location.href='game2.html'" class="btn-proceed">
                Enter the State Archives ➔
            </button>
        `;

        const paperColumn = document.querySelector('.paper-column');
        if (paperColumn) { paperColumn.scrollTop = paperColumn.scrollHeight; }
    }
</script>
